services:
  postgres:
    image: postgres:17
    container_name: open_acs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - open_acs_postgres_data:/var/lib/postgresql/data

volumes:
  open_acs_postgres_data: