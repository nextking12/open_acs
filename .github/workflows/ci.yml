name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    # Dummy values so modules that read them at import time (the Prisma client
    # in lib/prisma.ts, Auth.js in auth.ts) don't throw during typecheck/build.
    # No real database is contacted: every page is dynamic and these tests do
    # not hit the database.
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/open_acs
      AUTH_SECRET: ci-placeholder-secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The Prisma client is generated into generated/ (gitignored), so it must
      # be regenerated before typecheck/build can resolve its imports.
      - run: pnpm db:generate

      - run: pnpm lint
      - run: pnpm exec tsc --noEmit
      - run: pnpm test
      - run: pnpm build
